    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7fa;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
            padding-bottom: 50px;
        }
        .search-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
        }
        h2 {
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 20px;
        }
        .search-box {
            display: flex;
            gap: 10px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e6ed;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }
        input[type="text"]:focus {
            border-color: #3498db;
        }
        button {
            padding: 12px 25px;
            background-color: #3498db;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #2980b9;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: #e8f4fd;
            border: 1px solid #bce0fd;
            border-radius: 8px;
        }
        .result-item {
            margin: 10px 0;
            color: #34495e;
            font-size: 15px;
            border-bottom: 1px dashed #bce0fd;
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
        }
        .result-item:last-child {
            border-bottom: none;
            padding-bottom: 0;
        }
        .result-label {
            font-weight: 700;
            color: #2980b9;
        }
        .result-value {
            font-weight: 500;
            text-align: right;
            color: #2c3e50;
            max-width: 60%;
            word-wrap: break-word;
        }
        
        /* New CSS for the clickable links */
        .result-value a {
            color: #3498db;
            text-decoration: none;
            transition: color 0.2s ease;
        }
        .result-value a:hover {
            color: #2980b9;
            text-decoration: underline;
        }

        .error {
            color: #e74c3c;
            margin-top: 20px;
            text-align: center;
            font-weight: 600;
            display: none;
            background: #fadbd8;
            padding: 10px;
            border-radius: 8px;
        }
        #resultsContainer {
            margin-top: 10px;
        }
    </style>
</head>

        function checkEnter(event) {
            if (event.key === "Enter") {
                searchData();
            }
        }

        function searchData() {
            const query = document.getElementById("searchInput").value.toLowerCase().trim();
            const resultsContainer = document.getElementById("resultsContainer");
            const errorMsg = document.getElementById("errorMsg");

            resultsContainer.innerHTML = "";
            errorMsg.style.display = "none";

            if (query === "") return;

            const foundInstitutions = database.filter(item => item.name.toLowerCase().includes(query));

            if (foundInstitutions.length > 0) {
                foundInstitutions.forEach(foundInstitution => {
                    // Convert email to lowercase before displaying and making the link
                    const lowerCaseEmail = foundInstitution.email.toLowerCase();

                    const resultHtml = `
                        <div class="result-box">
                            <div class="result-item">
                                <span class="result-label">Institution Name:</span>
                                <span class="result-value">${foundInstitution.name}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">HOI Mobile:</span>
                                <span class="result-value"><a href="tel:${foundInstitution.hoi}">${foundInstitution.hoi}</a></span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Email Address:</span>
                                <span class="result-value"><a href="mailto:${lowerCaseEmail}">${lowerCaseEmail}</a></span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Nodal Officer Name:</span>
                                <span class="result-value">${foundInstitution.nodalName}</span>
                            </div>
                            <div class="result-item">
                                <span class="result-label">Nodal Mobile:</span>
                                <span class="result-value"><a href="tel:${foundInstitution.nodalPhone}">${foundInstitution.nodalPhone}</a></span>
                            </div>
                        </div>
                    `;
                    resultsContainer.innerHTML += resultHtml;
                });
            } else {
                errorMsg.style.display = "block";
            }
